name: Build Android APK

on:
  workflow_dispatch:

concurrency:
  group: build-android-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    env:
      APP_ORG: com.twogganon
      APP_PACKAGE: com.twogganon.ggcatalogue
      APP_VERSION_NAME: 1.0.${{ github.run_number }}
      APP_VERSION_CODE: ${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform files
        run: flutter create --platforms=android --org "$APP_ORG" .

      - name: Prepare signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Missing signing secrets. Configure ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD."
            exit 1
          fi
          mkdir -p android
          export ANDROID_KEYSTORE_BASE64
          python - <<'PY'
          import base64
          import os
          import pathlib
          import re
          import sys

          raw = os.environ.get("ANDROID_KEYSTORE_BASE64", "")
          clean = re.sub(r"\s+", "", raw)
          if not clean:
            print("ANDROID_KEYSTORE_BASE64 is empty after whitespace cleanup.")
            sys.exit(1)
          try:
            decoded = base64.b64decode(clean, validate=True)
          except Exception as exc:
            print(f"Invalid ANDROID_KEYSTORE_BASE64: {exc}")
            sys.exit(1)

          out = pathlib.Path("android/release-keystore.jks")
          out.write_bytes(decoded)
          print(f"Wrote keystore bytes: {len(decoded)}")
          PY

      - name: Install Python imaging dependency
        run: python -m pip install pillow

      - name: Use header icon as Android app icon
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          src = Path("assets/www/assets/2G.avif")
          if not src.exists():
            raise SystemExit("Missing icon source: assets/www/assets/2G.avif")

          with Image.open(src) as im:
            if im.mode not in ("RGB", "RGBA"):
              im = im.convert("RGBA")
            # Preserve transparency and fit icon into Android launcher sizes.
            sizes = {
              "mipmap-mdpi": 48,
              "mipmap-hdpi": 72,
              "mipmap-xhdpi": 96,
              "mipmap-xxhdpi": 144,
              "mipmap-xxxhdpi": 192,
            }
            for folder, size in sizes.items():
              out_dir = Path("android/app/src/main/res") / folder
              out_dir.mkdir(parents=True, exist_ok=True)
              icon = im.resize((size, size), Image.Resampling.LANCZOS)
              icon.save(out_dir / "ic_launcher.png", format="PNG")
              icon.save(out_dir / "ic_launcher_round.png", format="PNG")

          print("Generated Android launcher icons from assets/www/assets/2G.avif")
          PY

      - name: Normalize package id and version metadata
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          app_package = os.environ["APP_PACKAGE"]
          version_name = os.environ["APP_VERSION_NAME"]
          version_code = os.environ["APP_VERSION_CODE"]

          gradle_kts = Path("android/app/build.gradle.kts")
          gradle_groovy = Path("android/app/build.gradle")
          target = gradle_kts if gradle_kts.exists() else gradle_groovy
          if not target.exists():
            raise SystemExit("Could not find android/app/build.gradle(.kts)")

          text = target.read_text(encoding="utf-8")
          if target.suffix == ".kts":
            text = re.sub(r'applicationId\s*=\s*"[^"]*"', f'applicationId = "{app_package}"', text)
            text = re.sub(r'versionName\s*=\s*"[^"]*"', f'versionName = "{version_name}"', text)
            text = re.sub(r'versionCode\s*=\s*\d+', f'versionCode = {version_code}', text)
          else:
            text = re.sub(r'applicationId\s+"[^"]*"', f'applicationId "{app_package}"', text)
            text = re.sub(r'versionName\s+"[^"]*"', f'versionName "{version_name}"', text)
            text = re.sub(r'versionCode\s+\d+', f'versionCode {version_code}', text)

          target.write_text(text, encoding="utf-8")
          print(f"Updated {target} with package={app_package}, versionName={version_name}, versionCode={version_code}")
          PY

      - name: Ensure bundled card art is present
        run: |
          set -e
          mkdir -p assets/www/assets

          if [ ! -d assets/www/assets/cards ] || [ "$(find assets/www/assets/cards -type f 2>/dev/null | wc -l)" -eq 0 ]; then
            if [ -d "Android SVE Catalogue/app/assets/cards" ]; then
              echo "Copying card art from Android SVE Catalogue/app/assets/cards"
              cp -r "Android SVE Catalogue/app/assets/cards" assets/www/assets/cards
            elif [ -d "app/assets/cards" ]; then
              echo "Copying card art from app/assets/cards"
              cp -r app/assets/cards assets/www/assets/cards
            fi
          fi

          ART_COUNT="$(find assets/www/assets/cards -type f 2>/dev/null | wc -l || true)"
          echo "Bundled art file count: ${ART_COUNT}"
          if [ "${ART_COUNT}" -eq 0 ]; then
            echo "ERROR: No bundled card art found at assets/www/assets/cards."
            echo "Upload the offline-art build contents (including assets/www/assets/cards) before building."
            exit 1
          fi

      - name: Ensure INTERNET permission
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path("android/app/src/main/AndroidManifest.xml")
          text = p.read_text(encoding="utf-8")
          token = '<uses-permission android:name="android.permission.INTERNET"/>'
          if token not in text:
              text = text.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    ' + token,
                  1,
              )
              p.write_text(text, encoding="utf-8")
              print("Added INTERNET permission")
          else:
              print("INTERNET permission already present")
          PY

      - name: Expand card asset directories in pubspec
        run: |
          python - <<'PY'
          from pathlib import Path

          pubspec = Path("pubspec.yaml")
          cards_root = Path("assets/www/assets/cards")
          if not cards_root.exists():
            raise SystemExit("assets/www/assets/cards not found")

          text = pubspec.read_text(encoding="utf-8")
          lines = text.splitlines()
          out = []
          inserted = False
          card_dirs = sorted([p for p in cards_root.iterdir() if p.is_dir()], key=lambda p: p.name.lower())
          card_entries = [f"    - assets/www/assets/cards/{d.name}/" for d in card_dirs]

          for line in lines:
            out.append(line)
            if line.strip() == "- assets/www/assets/cards/" and not inserted:
              for e in card_entries:
                if e not in out:
                  out.append(e)
              inserted = True

          if not inserted:
            raise SystemExit("Could not find '- assets/www/assets/cards/' in pubspec.yaml")

          pubspec.write_text("\n".join(out) + "\n", encoding="utf-8")
          print(f"Added {len(card_entries)} card-set asset directory entries to pubspec.yaml")
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --build-name "$APP_VERSION_NAME" --build-number "$APP_VERSION_CODE"

      - name: Sign release APK (stable update key)
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n1)/apksigner"
          APK_IN="build/app/outputs/flutter-apk/app-release.apk"
          APK_OUT="build/app/outputs/flutter-apk/app-release-signed.apk"
          "$APKSIGNER" sign \
            --ks android/release-keystore.jks \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass "pass:$ANDROID_KEY_PASSWORD" \
            --out "$APK_OUT" \
            "$APK_IN"
          "$APKSIGNER" verify --verbose "$APK_OUT"

      - name: Verify APK contains bundled card art
        run: |
          set -e
          python - <<'PY'
          import zipfile
          apk = "build/app/outputs/flutter-apk/app-release-signed.apk"
          with zipfile.ZipFile(apk, "r") as z:
              names = z.namelist()
              count = sum(
                  1
                  for n in names
                  if "/assets/www/assets/cards/" in n.replace("\\", "/")
              )
          print(f"APK bundled art file count: {count}")
          if count == 0:
              print("Sample APK entries:")
              for n in names[:200]:
                  print(n)
              raise SystemExit("ERROR: APK has no bundled card art.")
          PY

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: sve-catalogue-apk
          path: build/app/outputs/flutter-apk/app-release-signed.apk
          compression-level: 0
          retention-days: 7
          if-no-files-found: error

      - name: Attach APK to GitHub Release (optional on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release-signed.apk
