name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Generate Android platform files
        run: flutter create --platforms=android .

      - name: Sync cards from official website
        run: |
          set -e
          python tool/sync_official_cards.py

      - name: Ensure INTERNET permission
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path("android/app/src/main/AndroidManifest.xml")
          text = p.read_text(encoding="utf-8")
          token = '<uses-permission android:name="android.permission.INTERNET"/>'
          if token not in text:
              text = text.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    ' + token,
                  1,
              )
              p.write_text(text, encoding="utf-8")
              print("Added INTERNET permission")
          else:
              print("INTERNET permission already present")
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sve-catalogue-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Attach APK to GitHub Release (optional on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
