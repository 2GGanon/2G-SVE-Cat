name: sve_catalogue_flutter
description: Shadowverse Evolve catalogue Android shell using Flutter + WebView.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.8.0
  path_provider: ^2.1.4
  camera: ^0.11.0+2
  google_mlkit_text_recognition: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/www/index.html
    - assets/www/styles.css
    - assets/www/app.js
    - assets/www/manifest.webmanifest
    - assets/www/sw.js
    - assets/www/assets/
    - assets/www/data/cards-data.js
    - assets/www/data/offline-art-manifest.json
    - assets/www/data/text-icon-manifest.json
    - assets/www/data/shadowverse-cardtype-cache.json
